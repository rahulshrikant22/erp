name: Build Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-build.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build Next.js standalone
        working-directory: frontend
        env:
          BASE_PATH: /erp
        run: npm run build

      - name: Debug standalone output
        run: |
          echo "=== standalone root ==="
          ls -la frontend/.next/standalone/
          echo "=== looking for server.js ==="
          find frontend/.next/standalone -name "server.js" -type f
          echo "=== standalone subdirs ==="
          ls -la frontend/.next/standalone/*/ 2>/dev/null || true

      - name: Package standalone output
        run: |
          mkdir -p /tmp/frontend-pkg/.next
          # Find where server.js actually lives in standalone output
          SERVER_DIR=$(dirname $(find frontend/.next/standalone -name "server.js" -type f | head -1))
          echo "Server directory: $SERVER_DIR"
          cp -r "$SERVER_DIR"/* /tmp/frontend-pkg/ 2>/dev/null || cp -r "$SERVER_DIR"/. /tmp/frontend-pkg/
          cp -r frontend/.next/static /tmp/frontend-pkg/.next/static
          cp -r frontend/public /tmp/frontend-pkg/public 2>/dev/null || mkdir -p /tmp/frontend-pkg/public
          echo "=== Package contents ==="
          ls -la /tmp/frontend-pkg/
          cd /tmp/frontend-pkg && tar czf /tmp/frontend-standalone.tar.gz .

      - name: Upload as release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete frontend-latest --yes --repo ${{ github.repository }} 2>/dev/null || true
          gh release create frontend-latest /tmp/frontend-standalone.tar.gz \
            --title "Frontend Build" \
            --notes "Auto-built Next.js standalone - $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --repo ${{ github.repository }}

      - name: Trigger Coolify deploy
        run: |
          curl -s -X GET \
            "http://${{ secrets.COOLIFY_HOST }}/api/v1/deploy?uuid=${{ secrets.COOLIFY_FRONTEND_UUID }}&force=true" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
